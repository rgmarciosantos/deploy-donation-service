apiVersion: apps/v1
kind: Deployment
metadata:
  name: donation-service
  namespace: solidarytech-donation
  labels:
    app.kubernetes.io/name: donation-service
    app.kubernetes.io/component: donation
    app.kubernetes.io/part-of: solidarytech
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: donation-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: donation-service
        app.kubernetes.io/name: donation-service
        app.kubernetes.io/component: donation
        app.kubernetes.io/part-of: solidarytech
    spec:
      # ──────────────────────────────────────────────
      # initContainer: monta a DATABASE_URL a partir dos secrets
      # (mesmo padrão do auth-service)
      # ──────────────────────────────────────────────
      initContainers:
        - name: build-database-url
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              python3 << 'EOF'
              import urllib.parse
              import os

              user = os.environ.get('DB_USER', '')
              password = os.environ.get('DB_PASSWORD', '')
              host = os.environ.get('DB_HOST', '')
              port = os.environ.get('DB_PORT', '5432')
              dbname = os.environ.get('DB_NAME', '')

              encoded_user = urllib.parse.quote(user, safe='')
              encoded_password = urllib.parse.quote(password, safe='')

              database_url = f"postgres://{encoded_user}:{encoded_password}@{host}:{port}/{dbname}?sslmode=require"

              with open('/shared/DATABASE_URL', 'w') as f:
                  f.write(database_url)
              EOF
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: donation-service-config
                  key: DONATION_DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: donation-service-config
                  key: DONATION_DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: donation-service-config
                  key: DONATION_DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: donation-service-rds
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: donation-service-rds
                  key: password
          volumeMounts:
            - name: shared-data
              mountPath: /shared

      containers:
        - name: donation-service
          # A tag é atualizada AUTOMATICAMENTE pelo CI do repo donation-service
          # a cada push na main (não edite a tag manualmente).
          image: 042702827117.dkr.ecr.us-east-1.amazonaws.com/solidarytech/donation-service:53b3ee021e5d6258ff46007d53d31887db82f3d1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              export DATABASE_URL=$(cat /shared/DATABASE_URL)
              exec ./donation-service
          ports:
            - name: http
              containerPort: 8082
          env:
            - name: PORT
              value: "8082"
            - name: AWS_REGION
              value: "us-east-1"
            - name: AWS_SQS_URL
              valueFrom:
                secretKeyRef:
                  name: donation-service-config
                  key: DONATION_SQS_URL
                  optional: true
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: secret-access-key
            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: session-token
          volumeMounts:
            - name: shared-data
              mountPath: /shared
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi

      volumes:
        - name: shared-data
          emptyDir: {}
