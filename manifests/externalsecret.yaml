## ──────────────────────────────────────────────
## ExternalSecret: credenciais do RDS (gerenciadas pela AWS)
## ──────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: donation-service-rds
  namespace: solidarytech-donation
  labels:
    app.kubernetes.io/name: donation-service
    app.kubernetes.io/component: donation
    app.kubernetes.io/part-of: solidarytech
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager-us-east-1
    kind: SecretStore
  target:
    name: donation-service-rds
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: rds!db-REPLACE_WITH_DONATION_DB_SECRET_UUID
        property: username
    - secretKey: password
      remoteRef:
        key: rds!db-REPLACE_WITH_DONATION_DB_SECRET_UUID
        property: password
---
## ──────────────────────────────────────────────
## ExternalSecret: config do donation-service
## Source: solidarytech/donation-service (AWS Secrets Manager)
##
## Crie esse secret no Secrets Manager com as chaves abaixo:
##   DONATION_DB_HOST  -> endpoint do RDS donation (terraform output rds_endpoints)
##   DONATION_DB_PORT  -> "5432"
##   DONATION_DB_NAME  -> "donation_db"
##   DONATION_SQS_URL  -> URL da fila SQS (opcional; terraform output)
## ──────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: donation-service-config
  namespace: solidarytech-donation
  labels:
    app.kubernetes.io/name: donation-service
    app.kubernetes.io/component: donation
    app.kubernetes.io/part-of: solidarytech
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager-us-east-1
    kind: SecretStore
  target:
    name: donation-service-config
    creationPolicy: Owner
  data:
    - secretKey: DONATION_DB_HOST
      remoteRef:
        key: solidarytech/donation-service
        property: DONATION_DB_HOST
    - secretKey: DONATION_DB_PORT
      remoteRef:
        key: solidarytech/donation-service
        property: DONATION_DB_PORT
    - secretKey: DONATION_DB_NAME
      remoteRef:
        key: solidarytech/donation-service
        property: DONATION_DB_NAME
    - secretKey: DONATION_SQS_URL
      remoteRef:
        key: solidarytech/donation-service
        property: DONATION_SQS_URL
