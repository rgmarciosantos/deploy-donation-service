apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: donation-service
  namespace: solidarytech-donation
  labels:
    app.kubernetes.io/name: donation-service
    app.kubernetes.io/component: donation
    app.kubernetes.io/part-of: solidarytech
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    # Path público no singular (/donation) -> rota real da app (/donations).
    # O $1$2 preserva a barra e eventuais subpaths sem quebrar.
    nginx.ingress.kubernetes.io/rewrite-target: /donations$1$2
spec:
  ingressClassName: nginx
  rules:
    - host: solidarytech.pt
      http:
        paths:
          - path: /donation(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: donation-service
                port:
                  number: 8082
